<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Sing Moray</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-prussian-blue text-light-beige font-body">
    <nav class="bg-prussian-blue p-4 border-b border-sunshine-yellow">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-white text-2xl font-bold font-heading flex items-center">
                <img src="images/SingMoray Logo.jpg" alt="Sing Moray Logo" class="nav-logo">
                Sing Moray
            </a>
            <div>
                <a href="index.html" class="nav-link text-white mx-3">Home</a>
                <a href="index.html#about" class="nav-link text-white mx-3">About</a>
                <a href="index.html#join" class="nav-link text-white mx-3">Join Us</a>
                <a href="events.html" class="nav-link text-white mx-3 active">Events</a>
                <a href="social.html" class="nav-link text-white mx-3">Social</a>
                <a href="gallery.html" class="nav-link text-white mx-3">Gallery</a>
                <a href="index.html#contact" class="nav-link text-white mx-3">Contact</a>
                <a href="https://www.facebook.com/singmoray" target="_blank" class="nav-link text-white mx-3 hover:text-sunshine-yellow">Facebook</a>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-prussian-blue to-dark-grey py-16">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-heading mb-4 text-sunshine-yellow">Events</h1>
            <p class="text-xl font-body">Our upcoming performances and past concerts</p>
        </div>
    </header>

    <main class="container mx-auto py-12">
        <section id="upcoming-events" class="mb-16">
            <h2 class="text-3xl font-heading text-sunshine-yellow mb-8">Upcoming Events</h2>
            <div id="upcoming-container" class="grid gap-8">
                <!-- Populated by JavaScript -->
            </div>
        </section>

        <section id="past-events">
            <h2 class="text-3xl font-heading text-sunshine-yellow mb-8">Past Events</h2>
            <div id="past-container" class="grid gap-6">
                <!-- Populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="bg-dark-grey text-light-beige text-center py-4 border-t border-sunshine-yellow">
        <p class="font-body">&copy; 2026 Sing Moray. All rights reserved.</p>
    </footer>

    <script src="events.js"></script>
    <script>
        function formatDate(dateStr) {
            const date = new Date(dateStr + "T00:00:00");
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-GB', options);
        }

        function renderEvent(event, isUpcoming, isFeatured) {
            const card = document.createElement('div');
            let classes = 'event-card';
            if (!isUpcoming) classes += ' past-event';
            if (isFeatured) classes += ' featured';
            card.className = classes;

            let metaHtml = `<span>📅 ${formatDate(event.date)}</span>`;
            if (event.time) {
                metaHtml += `<span>🕖 ${event.time}</span>`;
            }
            metaHtml += `<span>📍 ${event.location}</span>`;

            let ticketHtml = '';
            if (isUpcoming && event.tickets) {
                ticketHtml = `<p class="mt-3 text-sm">${event.tickets}</p>`;
                if (event.ticketUrl) {
                    ticketHtml += `<a href="${event.ticketUrl}" target="_blank" class="ticket-link">Get Tickets</a>`;
                }
            }

            card.innerHTML = `
                <div class="event-header">
                    <h3>${event.name}${isFeatured ? ' <span style="font-size:0.8rem; font-family: Source Sans Pro, sans-serif;">&mdash; Next Up!</span>' : ''}</h3>
                    <div class="event-meta">${metaHtml}</div>
                </div>
                <div class="event-body">
                    <p>${event.description}</p>
                    ${ticketHtml}
                </div>
            `;
            return card;
        }

        function renderEvents() {
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            const upcoming = events
                .filter(e => new Date(e.date + "T00:00:00") >= now)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const past = events
                .filter(e => new Date(e.date + "T00:00:00") < now)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            const upcomingContainer = document.getElementById('upcoming-container');
            const pastContainer = document.getElementById('past-container');

            if (upcoming.length === 0) {
                upcomingContainer.innerHTML = '<p class="text-lg">No upcoming events at the moment. Follow us on <a href="https://www.facebook.com/singmoray" target="_blank" class="text-sunshine-yellow hover:underline">Facebook</a> for updates!</p>';
            } else {
                upcoming.forEach((event, index) => {
                    upcomingContainer.appendChild(renderEvent(event, true, index === 0));
                });
            }

            if (past.length === 0) {
                document.getElementById('past-events').style.display = 'none';
            } else {
                past.forEach(event => {
                    pastContainer.appendChild(renderEvent(event, false, false));
                });
            }
        }

        renderEvents();
    </script>
</body>
</html>
